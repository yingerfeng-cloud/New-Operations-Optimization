<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>安全生产运筹优化底座平台</title>
  <link rel="stylesheet" href="static/css/platform.css?v=20260605-final" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">优</div>
        <div>
          安全生产运筹优化底座
          <small>Pyomo + HiGHS</small>
        </div>
      </div>
      <nav class="nav" id="nav"></nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <input class="search" placeholder="搜索模型、组件、任务或报告" oninput="setSearch(this.value)" />
        <div class="actions">
          <span class="topbar-status">后端状态 <span class="pill amber" id="backendStatusPill">未连接</span></span>
          <span class="topbar-status">当前求解器 <span class="pill blue">HiGHS</span></span>
        </div>
      </header>
      <section class="content" id="content"></section>
    </main>
  </div>

  <div class="modal" id="modal">
    <div class="modal-card">
      <div class="panel-title"><span id="modalTitle"></span></div>
      <div id="modalBody" class="mt"></div>
      <div id="modalFooter" class="actions mt"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="static/js/platform-api.js?v=20260605-final"></script>
  <script src="static/js/platform-core.js?v=20260605-final"></script>
  <script src="static/js/problem_type_diagnosis.js?v=20260605-final"></script>
  <script src="static/js/platform-pages-main.js?v=20260605-final"></script>
  <script src="static/js/platform-formula-editor.js?v=20260605-final"></script>
  <script src="static/js/platform-pages-modeling.js?v=20260605-final"></script>
  <script src="static/js/platform-component-editor.js?v=20260605-final"></script>
  <script src="static/js/platform-actions.js?v=20260605-final"></script>
  <script src="static/js/platform-init.js?v=20260605-final"></script>
</body>
</html>
