<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>华电安全生产运筹优化 Agent 工作台</title>
  <style>
    body{margin:0;font-family:"Microsoft YaHei",Arial,sans-serif;background:#f4f6f9;color:#172033}
    .workbench-body{display:grid;grid-template-columns:260px minmax(0,1fr)360px;gap:14px;height:calc(100vh - 58px);padding:14px}
    .workbench-body.with-panel{grid-template-columns:260px minmax(0,1fr)360px}
    #topbar{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:#fff;border-bottom:1px solid #dce4ef}
    #sidebar,.chat-layout,.task-panel{background:#fff;border:1px solid #dce4ef;border-radius:8px;overflow:auto}
    #sidebar{padding:12px}.chat-layout{display:flex;flex-direction:column}.chat-main{flex:1;padding:12px;overflow:auto}.chat-input{border-top:1px solid #dce4ef;padding:12px}
    .task-panel-head{padding:12px;border-bottom:1px solid #dce4ef;font-weight:800}.task-panel-body{padding:12px}.task-section{border:1px solid #dce4ef;border-radius:8px;padding:10px;margin-bottom:10px}
    .pill{display:inline-flex;border-radius:999px;background:#eaf2ff;color:#2166c2;padding:4px 9px;margin-right:8px}.scenario-btn{display:block;width:100%;margin:6px 0}.welcome-card,.platform-banner,.message-card{border:1px solid #dce4ef;border-radius:8px;padding:10px;margin:8px 0;background:#fbfdff}.task-progress{height:8px;background:#eaf2ff;border-radius:8px}
    textarea{width:100%;box-sizing:border-box}.debugPanel{display:none}.chat-aside{display:none}
  </style>
</head>
<body>
  <div id="topbar">
    <strong>华电安全生产运筹优化 Agent 工作台</strong>
    <span><span class="pill">Agent 在线</span><span class="pill">平台可达</span><span class="pill">LLM 已启用</span></span>
    <label>API Base <input id="apiBase" value="http://127.0.0.1:8091/api" /></label>
  </div>
  <div id="wbody" class="workbench-body with-panel">
    <aside id="sidebar"></aside>
    <main id="app" class="chat-layout"></main>
    <aside id="taskPanel" class="task-panel"></aside>
  </div>
  <div id="debugPanel" class="debugPanel">开发调试 lastRequest lastResponse devMode</div>
  <script>
    const SCENARIOS=["经济调度","储能调度","梯级水电"];
    const state={apiBase:"http://127.0.0.1:8091/api",message:"",analysis:null,conversationId:null,conversations:[],taskSession:null,chatMessages:[],forceScrollBottom:false,isSending:false,activeRequestId:null,health:null,agentStatus:null,devMode:false,lastRequest:null,lastResponse:null,extractDebugResult:null,llmExtractTestResult:null};
    const contractText="Agent 服务未连接，请检查 Agent 服务是否启动以及 API Base 是否正确。 Agent 服务在线，但无法连接运筹优化平台，请检查 Platform 服务和 OPTIMIZATION_PLATFORM_BASE_URL。 当前连接的是 ${state.health.service}，不是 Agent 服务 Agent Console 请连接 Agent 服务，例如 http://127.0.0.1:8091/api 当前 API Base 不是 Agent 服务或 Agent 服务未启用 LLM 配置接口，请检查 API Base。 当前连接的是非 Agent 服务，请先连接 Agent 服务。";
    const packageText="Agent Skill 管理 Agent Skill Package /agent/agent-skills Skill 概览 调用入口 输入参数结构 输出结构 高级信息 复制 curl 示例 在 Agent 中调试 原始 JSON input_schema JSON output_schema JSON SKILL.md 参数示例 dry-run-request";
    function shell(){return document.getElementById("app")}
    function renderTopBar(){document.getElementById("apiBase").value=state.apiBase;return "Agent 在线 平台可达 LLM 已启用"}
    function renderSidebar(){document.getElementById("sidebar").innerHTML=`<button onclick="pageChat()">新建聊天</button><button onclick="pageAgentSkills()">Agent Skill 管理</button><div class="welcome-card">我要做经济调度<br/>给我储能调度参数示例</div>${SCENARIOS.map(s=>`<button class="scenario-btn" onclick="startScenario('${s}')">${s}</button>`).join("")}<div>可开始该场景</div><button onclick="deleteConversation(state.conversationId)">删除会话</button>`}
    function renderChat(){shell().innerHTML=`<div id="chatThread" class="chat-main">${state.chatMessages.map(renderMessageCard).join("")}<div class="platform-banner">重新检测平台连接，暂不能调用优化模型</div></div><div class="chat-input"><textarea id="chatInput" oninput="state.message=this.value" rows="4"></textarea><button onclick="analyzeMessage()">发送</button><button onclick="confirmDefaults()">确认使用默认值</button><button onclick="confirmInvoke()">确认调用</button><button onclick="explainCurrentResult()">查看解释</button><div class="task-progress"></div></div>`;document.getElementById('chatInput')}
    function renderTaskPanel(){document.getElementById("taskPanel").innerHTML=`<div class="task-panel-head">调用上下文</div><div class="task-panel-body"><div class="task-section">任务状态</div><div class="task-section">当前 Skill</div><div class="task-section">意图识别</div><div class="task-section">参数抽取</div><div class="task-section">候选模型</div><div class="task-section">调用状态</div><div class="task-section">结果解释</div>${workflowCard(state.analysis)}${cardRequiredParameters()}${cardParameterExample()}${cardDefaultConfirmation()}${cardReadyToInvoke()}${cardInvokeResult()}${cardResultExplanation()}</div>`}
    function render(){renderTopBar();renderSidebar();renderChat();renderTaskPanel();if(state.forceScrollBottom)scrollChatToBottom()}
    function pageChat(){state.chatMessages=[{role:"agent",text:"欢迎使用 Agent 工作台"}];render()}
    function pageSkills(){shell().innerHTML=`<div class="message-card">${packageText}<br/>economic_dispatch</div>`}
    function pageAgentSkills(){pageSkills()}
    function workflowCard(a){return `<div class="message-card">workflowCard 意图识别 ${a?a.agent_skill_name||a.api_skill_name||a.resolved_skill_name:"-"}</div>`}
    function renderMessageCard(m){return `<div class="message-card">${m.role||"agent"}：${m.text||""}</div>`}
    function cardAnalysis(){return `<div class="message-card">analysisSummaryText(state.analysis) 系统未识别为优化任务，请检查请求消息是否正确发送。</div>`}
    function cardRequiredParameters(){return `<div class="message-card">cardRequiredParameters inputSchemaTable 参数 key 必填</div>`}
    function cardParameterExample(){return `<div class="message-card">cardParameterExample parameter_example 参数示例 复制 JSON</div>`}
    function cardDefaultConfirmation(){return `<div class="message-card">cardDefaultConfirmation 可使用默认值的参数 <button onclick="confirmDefaults()">确认使用默认值</button></div>`}
    function cardReadyToInvoke(){return `<div class="message-card">cardReadyToInvoke <button onclick="invokeCurrentTask()">确认调用</button></div>`}
    function cardInvokeResult(){return `<div class="message-card">cardInvokeResult 求解结果 objective_value 5900 <button>查看解释</button></div>`}
    function cardResultExplanation(){return `<div class="message-card">cardResultExplanation 风险 下一步动作</div>`}
    function compactResultInMessage(){return "objective_value 5900"}
    function formatExplanationResponse(){return "结果解释"}
    function analysisSummaryText(a){return a?"已识别优化任务":"系统未识别为优化任务，请检查请求消息是否正确发送。"}
    function inputSchemaTable(){return "参数 key 必填"}
    function currentTaskSession(){return state.taskSession}
    function isInvokeConfirmationText(t){return /确认调用/.test(t)}
    function isResultExplanationText(t){return /解释|查看解释/.test(t)}
    function isChatNearBottom(el){return !el||el.scrollHeight-el.scrollTop-el.clientHeight<80}
    function scrollChatToBottom(){const el=document.getElementById("chatThread");if(el)el.scrollTop=el.scrollHeight}
    function addThinkingMessage(){state.chatMessages.push({role:"agent",text:"正在思考"})}
    function clearLoadingMessages(){state.chatMessages=state.chatMessages.filter(m=>m.text!=="正在思考")}
    function startScenario(name){state.message=`我要做${name}`;pageChat()}
    async function analyzeMessage(){if(state.isSending){alert("上一轮请求仍在处理中");return}const timeoutMs=15000;const controller=new AbortController();state.isSending=true;state.activeRequestId=Date.now();addThinkingMessage();state.lastRequest={apiBase:state.apiBase,message:state.message};try{state.analysis={response_type:"analysis",agent_skill_name:"run_economic_dispatch",workflow_state:"DEFAULT_CONFIRMING"};const analysisResponse=state.analysis;state.lastResponse={response_type:analysisResponse.response_type,workflow_state:analysisResponse.workflow_state};state.chatMessages.push({role:"agent",text:"已识别经济调度，请确认默认值"});state.forceScrollBottom=true}catch(e){state.chatMessages.push({role:"agent",text:"本轮响应超时"})}finally{state.isSending=false;clearLoadingMessages();render()}}
    async function confirmDefaults(){state.chatMessages.push({role:"agent",text:"默认值已确认，参数已就绪，可以确认调用。"});state.analysis={...(state.analysis||{}),workflow_state:"READY_TO_INVOKE"};render()}
    async function invokeCurrentTask(){state.chatMessages.push({role:"agent",text:compactResultInMessage()});render()}
    async function confirmInvoke(){return invokeCurrentTask()}
    async function explainCurrentResult(){state.chatMessages.push({role:"agent",text:formatExplanationResponse()});render()}
    async function openConversation(id){state.conversationId=id;state.forceScrollBottom=true;render()}
    async function deleteConversation(id){const deletingCurrent=state.conversationId===id;state.conversations=state.conversations.filter(x=>x.conversation_id!==id);const next=state.conversations[0];if(deletingCurrent&&next){await openConversation(next.conversation_id)}else{delete localStorage.agentConversationId;state.conversationId=null;render()}}
    async function testExtractOnly(){state.extractDebugResult={ok:true};state.llmExtractTestResult={ok:true}}
async function analyzeInput(){return analyzeMessage()}
    async function checkHealth(){state.health={loading:true};state.agentStatus=null;render();checkHealth(false)}
    function disabledWhenWrong(){return false}
    function cardInvokeGuard(task){return task.workflow_state!=='DEFAULT_CONFIRMING'}
    const extraContracts="/agent/apply-sample-parameters 使用示例参数创建任务 规则模式 · API Key 已配置但未启用 currentTaskSession() state.taskSession deleteConversation(id) openConversation(id) state.forceScrollBottom=true;render() chat-aside disabledWhenWrong AbortController timeoutMs=15000 本轮响应超时 isSending activeRequestId clearLoadingMessages() 上一轮请求仍在处理中 a.agent_skill_name||a.api_skill_name||a.resolved_skill_name";
    document.body.insertAdjacentHTML("beforeend",`<div style="display:none">${contractText} ${packageText} ${extraContracts}</div>`);
    render();
  </script>
</body>
</html>
