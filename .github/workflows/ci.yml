name: production-quality

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
  schedule:
    - cron: '20 18 * * *'
  workflow_dispatch:
    inputs:
      include_slow:
        description: Run release-level slow pytest suite
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: '1'
  COPT_SYNC_JOBS: 'true'
  LLM_ENABLED: 'false'

jobs:
  frontend-quality:
    name: Frontend Typecheck Build Unit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.17.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - name: Full unit lifecycle (3 consecutive runs)
        shell: bash
        run: |
          for run in 1 2 3; do
            echo "unit lifecycle run ${run}/3"
            npm run test:unit
          done
        working-directory: frontend

  backend-contract:
    name: Backend Contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13.5'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Contract regression
        run: >-
          python -m pytest -q
          tests/test_model_time_dimension_contract.py
          tests/test_runtime_horizon_policy.py
          tests/test_model_dimension_normalization.py
          tests/test_model_set_reference_validation.py
          tests/test_hydro_p0_closure.py
          tests/test_hydro_pwl2d_performance.py
          tests/test_cascade_hydro_dispatch_v1.py
          tests/test_component_based_hydro_model.py
          tests/test_component_advanced_formula_a3.py

  backend-full:
    name: Backend Full
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13.5'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Default non-slow lifecycle (3 consecutive runs)
        shell: bash
        run: |
          for run in 1 2 3; do
            echo "backend default lifecycle run ${run}/3"
            python -m pytest -q -m "not slow"
          done

  backend-slow:
    name: Backend Slow Release Gate
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') || inputs.include_slow == true
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13.5'
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest -q -m slow

  mock-e2e:
    name: Mock E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.17.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run test:e2e:mock
        working-directory: frontend
      - name: Upload Mock E2E diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mock-e2e-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: ignore
          path: |
            frontend/playwright-report/
            frontend/test-results/frontend-mock/

  delivery-package:
    name: Delivery Package Self Check
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13.5'
      - name: Verify test matrix
        run: python scripts/verify_test_matrix.py
      - name: Build and inspect delivery package
        shell: pwsh
        run: ./package.ps1 -OutputPath "${{ runner.temp }}/copt-500.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: copt-500-delivery-${{ github.run_id }}
          path: ${{ runner.temp }}/copt-500.zip
          if-no-files-found: error
          retention-days: 14
